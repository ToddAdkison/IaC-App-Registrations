trigger:
  branches:
    include:
      - main
  paths:
    include:
      - terraform/**

variables:
  - group: terraform-secrets
  - name: tfWorkingDir
    value: $(System.DefaultWorkingDirectory)/Terraform/terraform

stages:

  # ── Stage 1: Validate ────────────────────────────────────────────
  - stage: Validate
    displayName: Validate
    jobs:
      - job: TerraformValidate
        displayName: Terraform Validate
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: ms-devlabs.custom-terraform-tasks.custom-terraform-installer-task.TerraformInstaller@0
            displayName: Install Terraform
            inputs:
              terraformVersion: '1.9.0'

          - task: ms-devlabs.custom-terraform-tasks.custom-terraform-release-task.TerraformTaskV4@4
            displayName: Terraform Init
            inputs:
              provider: azurerm
              command: init
              workingDirectory: $(tfWorkingDir)
              backendServiceArm: 'Terraform-AppReg'
              backendAzureRmResourceGroupName: 'rg-terraform-state'
              backendAzureRmStorageAccountName: 'sttfstate18957'
              backendAzureRmContainerName: 'tfstate'
              backendAzureRmKey: 'appreg.tfstate'
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_USE_OIDC: $(ARM_USE_OIDC)
              ARM_OIDC_TOKEN: $(System.AccessToken)

          - task: ms-devlabs.custom-terraform-tasks.custom-terraform-release-task.TerraformTaskV4@4
            displayName: Terraform Validate
            inputs:
              provider: azurerm
              command: validate
              workingDirectory: $(tfWorkingDir)

  # ── Stage 2: Plan ────────────────────────────────────────────────
  - stage: Plan
    displayName: Plan
    dependsOn: Validate
    jobs:
      - job: TerraformPlan
        displayName: Terraform Plan
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: ms-devlabs.custom-terraform-tasks.custom-terraform-installer-task.TerraformInstaller@0
            displayName: Install Terraform
            inputs:
              terraformVersion: '1.9.0'

          - task: ms-devlabs.custom-terraform-tasks.custom-terraform-release-task.TerraformTaskV4@4
            displayName: Terraform Init
            inputs:
              provider: azurerm
              command: init
              workingDirectory: $(tfWorkingDir)
              backendServiceArm: 'Terraform-AppReg'
              backendAzureRmResourceGroupName: 'rg-terraform-state'
              backendAzureRmStorageAccountName: 'sttfstate18957'
              backendAzureRmContainerName: 'tfstate'
              backendAzureRmKey: 'appreg.tfstate'
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_USE_OIDC: $(ARM_USE_OIDC)
              ARM_OIDC_TOKEN: $(System.AccessToken)

          - task: ms-devlabs.custom-terraform-tasks.custom-terraform-release-task.TerraformTaskV4@4
            displayName: Terraform Plan
            inputs:
              provider: azurerm
              command: plan
              workingDirectory: $(tfWorkingDir)
              environmentServiceNameAzureRM: 'Terraform-AppReg'
              commandOptions: '-out=tfplan'
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_USE_OIDC: $(ARM_USE_OIDC)
              ARM_OIDC_TOKEN: $(System.AccessToken)

          - task: PublishPipelineArtifact@1
            displayName: Publish Plan
            inputs:
              targetPath: '$(tfWorkingDir)/tfplan'
              artifact: tfplan

  # ── Stage 3: Apply ───────────────────────────────────────────────
  - stage: Apply
    displayName: Apply
    dependsOn: Plan
    jobs:
      - job: TerraformApply
        displayName: Terraform Apply
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: ms-devlabs.custom-terraform-tasks.custom-terraform-installer-task.TerraformInstaller@0
            displayName: Install Terraform
            inputs:
              terraformVersion: '1.9.0'

          - task: DownloadPipelineArtifact@2
            displayName: Download Plan
            inputs:
              artifact: tfplan
              path: $(tfWorkingDir)

          - task: ms-devlabs.custom-terraform-tasks.custom-terraform-release-task.TerraformTaskV4@4
            displayName: Terraform Init
            inputs:
              provider: azurerm
              command: init
              workingDirectory: $(tfWorkingDir)
              backendServiceArm: 'Terraform-AppReg'
              backendAzureRmResourceGroupName: 'rg-terraform-state'
              backendAzureRmStorageAccountName: 'sttfstate18957'
              backendAzureRmContainerName: 'tfstate'
              backendAzureRmKey: 'appreg.tfstate'
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_USE_OIDC: $(ARM_USE_OIDC)
              ARM_OIDC_TOKEN: $(System.AccessToken)

          - task: ms-devlabs.custom-terraform-tasks.custom-terraform-release-task.TerraformTaskV4@4
            displayName: Terraform Apply
            inputs:
              provider: azurerm
              command: apply
              workingDirectory: $(tfWorkingDir)
              environmentServiceNameAzureRM: 'Terraform-AppReg'
              commandOptions: 'tfplan'
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_USE_OIDC: $(ARM_USE_OIDC)
              ARM_OIDC_TOKEN: $(System.AccessToken)