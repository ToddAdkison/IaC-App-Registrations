trigger:
  branches:
    include:
      - main

pr: none

parameters:
  - name: configFile
    displayName: 'Config File Path'
    type: string
    default: '/AzCLI/app-config.yml'

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureServiceConnection: 'AzCLI-AppReg'

steps:
  - checkout: self
    clean: true

  # Debug: Show files in workspace
  - task: Bash@3
    displayName: 'Debug - List Files'
    inputs:
      targetType: 'inline'
      script: |
        echo "Current Directory: $(pwd)"
        echo "Files in workspace:"
        ls -la
        echo "----------------------------------------"

  # Install yq
  - task: Bash@3
    displayName: 'Install yq'
    inputs:
      targetType: 'inline'
      script: |
        if ! command -v yq &> /dev/null; then
          echo "Installing yq..."
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq && \
          sudo chmod +x /usr/local/bin/yq
        fi

  # Load Config with validation
  - task: Bash@3
    displayName: 'Load Config from Git'
    inputs:
      targetType: 'inline'
      script: |
        CONFIG_FILE="$(Build.SourcesDirectory)/${{ parameters.configFile }}"

        if [ ! -f "$CONFIG_FILE" ]; then
          echo "❌ ERROR: Config file '$CONFIG_FILE' not found!"
          echo "Make sure the file exists in the root of your repository and has been committed."
          echo "Current files:"
          ls -la
          exit 1
        fi

        echo "✅ Config file found: $CONFIG_FILE"
        echo "=========================================="
        cat "$CONFIG_FILE"
        echo "=========================================="

  # Create/Update App Registration
  - task: AzureCLI@2
    displayName: 'Create/Update App Registration'
    inputs:
      azureSubscription: '$(azureServiceConnection)'
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        CONFIG_FILE="$(Build.SourcesDirectory)/${{ parameters.configFile }}"

        APP_DISPLAY_NAME=$(yq '.appDisplayName' "$CONFIG_FILE")
        SIGN_IN_AUDIENCE=$(yq '.signInAudience' "$CONFIG_FILE")
        REDIRECT_URIS=$(yq '.redirectUris' "$CONFIG_FILE")
        API_PERMISSIONS=$(yq '.apiPermissions' "$CONFIG_FILE")

        echo "Deploying App Registration: $APP_DISPLAY_NAME"

        existingApp=$(az ad app list --filter "displayName eq '$APP_DISPLAY_NAME'" --query "[0].appId" -o tsv)

        if [ -z "$existingApp" ]; then
          echo "🆕 Creating new App Registration..."
          appId=$(az ad app create \
            --display-name "$APP_DISPLAY_NAME" \
            --sign-in-audience "$SIGN_IN_AUDIENCE" \
            --web-redirect-uris $REDIRECT_URIS \
            --query appId -o tsv)
        else
          echo "🔄 Updating existing App Registration..."
          appId=$existingApp
          az ad app update \
            --id $appId \
            --display-name "$APP_DISPLAY_NAME" \
            --sign-in-audience "$SIGN_IN_AUDIENCE" \
            --web-redirect-uris $REDIRECT_URIS
        fi

        echo "##vso[task.setvariable variable=APP_ID]$appId"
        echo "✅ App ID = $appId"